<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Lens Map Editor</title>
  <link rel="stylesheet" href="style.css?v=2.5.0" />
</head>

<body>
<header>
  <button id="backBtn">←</button>

  <h1 id="title">Lens Map</h1>

  <button id="saveBtn">保存</button>
</header>

  <main>
    <div id="canvasWrap">
      <canvas id="baseCanvas"></canvas>
      <canvas id="drawCanvas"></canvas>
    </div>
  </main>

<footer>
  <div class="footerTools">

    <button id="size05Btn"><span class="penIcon">●</span></button>
    <button id="size1Btn"><span class="penIcon">●</span></button>
    <button id="size2Btn"><span class="penIcon">●</span></button>
    <button id="size4Btn"><span class="penIcon">●</span></button>
    <button id="size8Btn"><span class="penIcon">●</span></button>

    <div class="divider"></div>

    <button id="surfaceBtn" class="active">
      <span class="colorDot black"></span>
      <span>表面</span>
    </button>

    <button id="insideBtn">
      <span class="colorDot red"></span>
      <span>内部</span>
    </button>

    <div class="divider"></div>

    <button id="frontBtn" class="active">Front</button>
    <button id="rearBtn">Rear</button>

<button id="penBtn" title="ペン">
  ✏️
</button>

<button id="eraserBtn">
  <svg viewBox="0 0 24 24" class="icon">
    <!-- 消しゴム本体 -->
    <path d="M20 9.5
             L14.5 4
             Q13.8 3.3 13 4
             L4.8 12.2
             Q4 13 4.8 13.8
             L9.8 18.8
             H12.5
             L20 11.3
             Q20.8 10.5 20 9.5Z"/>

    <!-- ラベル -->
    <path d="M10.2 8.2L15.8 13.8"
          stroke="#fff"
          stroke-width="2.2"
          stroke-linecap="round"/>

    <!-- 消したライン -->
    <path d="M3.5 20H11.5"/>
  </svg>
</button>

<button id="undoBtn">
  <svg viewBox="0 0 24 24" class="icon">
    <path d="M9 7L4 12L9 17"/>
    <path d="M4 12H13C17.4 12 21 15.6 21 20C21 24.4 17.4 28 13 28H10"/>
  </svg>
</button>

<button id="clearBtn">
  <svg viewBox="0 0 24 24" class="icon">
    <path d="M9 4h6"/>
    <path d="M4 7h16"/>
    <path d="M7 7l1 13h8l1-13"/>
    <path d="M10 11v6"/>
    <path d="M14 11v6"/>
  </svg>
</button>

  </div>
</footer>

  <script src="script.js?v=3.0.0"></script>
</body>

</html>
