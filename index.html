<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no"
  />
  <title>Lens Map Editor</title>
  <link rel="stylesheet" href="style.css?v=3.0.9" />
</head>

<body>

<div id="infoPanel">
    <div id="title">Lens Map</div>
    <div id="sideLabel">FRONT</div>
    <div id="version">v3.0.2</div>
</div>

<main>

    <div id="canvasWrap">

        <canvas id="baseCanvas"></canvas>

        <canvas id="drawCanvas"></canvas>

    </div>

</main>

<div id="rightBar">

    <div class="footerTools">

      <button id="size1Btn">
        <span class="penIcon">●</span>
      </button>

      <button id="size2Btn">
        <span class="penIcon">●</span>
      </button>

      <button id="size4Btn">
        <span class="penIcon">●</span>
      </button>

      <button id="size8Btn">
        <span class="penIcon">●</span>
      </button>

      <div class="divider"></div>

      <button id="surfaceBtn" class="active">
        <span class="colorDot black"></span>
        <span>表面</span>
      </button>

      <button id="insideBtn">
        <span class="colorDot red"></span>
        <span>内部</span>
      </button>

      <div class="divider"></div>

      <button id="penBtn" title="ペン">
        ✏️
      </button>

      <button id="eraserBtn" title="消しゴム">
        <svg viewBox="0 0 24 24" class="icon">
          <path d="M20 9.5
                   L14.5 4
                   Q13.8 3.3 13 4
                   L4.8 12.2
                   Q4 13 4.8 13.8
                   L9.8 18.8
                   H12.5
                   L20 11.3
                   Q20.8 10.5 20 9.5Z"/>

          <path
            d="M10.2 8.2L15.8 13.8"
            stroke="#fff"
            stroke-width="2.2"
            stroke-linecap="round"
          />

          <path d="M3.5 20H11.5"/>
        </svg>
      </button>

      <button id="undoBtn" title="元に戻す">
        <svg viewBox="0 0 24 24" class="icon">
          <path d="M9 7L4 12L9 17"/>
          <path d="M4 12H13C17.4 12 21 15.6 21 20C21 24.4 17.4 28 13 28H10"/>
        </svg>
      </button>

<button id="clearBtn" title="すべて消去">
  <svg viewBox="0 0 24 24" class="icon">
    <path d="M9 4h6"/>
    <path d="M4 7h16"/>
    <path d="M7 7l1 13h8l1-13"/>
    <path d="M10 11v6"/>
    <path d="M14 11v6"/>
  </svg>
</button>

<div class="divider saveDivider"></div>

<button id="saveBtn">保存</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js?v=3.1.4"></script>
</body>

</html>
